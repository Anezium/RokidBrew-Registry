name: Generate AI listing

on:
  workflow_dispatch:
    inputs:
      app:
        description: "App id in apps/<id>.json, or all"
        required: true
        default: "all"
      repo:
        description: "Optional GitHub repo override, owner/repo"
        required: false
        default: ""
      readme_path:
        description: "README path inside the repo"
        required: false
        default: ""
      readme_ref:
        description: "Optional branch/tag/SHA for the README"
        required: false
        default: ""
      model:
        description: "OpenRouter model"
        required: false
        default: "openai/gpt-4.1-mini"
      release_limit:
        description: "Number of GitHub Releases to copy into releases[]"
        required: false
        default: "5"
      dry_run:
        description: "Generate only, without opening a PR"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      direct_push:
        description: "Commit changes directly to the selected branch"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate listing with OpenRouter
        env:
          GITHUB_TOKEN: ${{ github.token }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ inputs.model }}
          INPUT_APP: ${{ inputs.app }}
          INPUT_REPO: ${{ inputs.repo }}
          INPUT_README_PATH: ${{ inputs.readme_path }}
          INPUT_README_REF: ${{ inputs.readme_ref }}
          INPUT_RELEASE_LIMIT: ${{ inputs.release_limit }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          mkdir -p .tmp

          generate_one() {
            local app="$1"
            local report=".tmp/ai-listing-${app}.md"
            local args=("$app" --release-limit "$INPUT_RELEASE_LIMIT" --report "$report")

            if [ -n "$INPUT_REPO" ]; then
              args+=(--repo "$INPUT_REPO")
            fi
            if [ -n "$INPUT_README_PATH" ]; then
              args+=(--readme-path "$INPUT_README_PATH")
            fi
            if [ -n "$INPUT_README_REF" ]; then
              args+=(--ref "$INPUT_README_REF")
            fi
            if [ "$INPUT_DRY_RUN" = "true" ]; then
              args+=(--dry-run)
            fi

            node scripts/generate-ai-listing.mjs "${args[@]}"
          }

          if [ "$INPUT_APP" = "all" ]; then
            : > .tmp/ai-listing-report.md
            failed=0
            for file in apps/*.json; do
              app="$(basename "$file" .json)"
              echo "Generating listing for ${app}"
              if generate_one "$app"; then
                if [ -f ".tmp/ai-listing-${app}.md" ]; then
                  cat ".tmp/ai-listing-${app}.md" >> .tmp/ai-listing-report.md
                  printf '\n---\n\n' >> .tmp/ai-listing-report.md
                fi
              else
                failed=$((failed + 1))
                printf '## %s\n\nGeneration failed; check workflow logs.\n\n---\n\n' "$app" >> .tmp/ai-listing-report.md
              fi
            done

            if [ "$failed" -gt 0 ]; then
              echo "${failed} app(s) failed during batch generation; continuing with successful updates."
            fi
            exit 0
          fi

          generate_one "$INPUT_APP"

      - name: Rebuild registry
        if: ${{ inputs.dry_run != 'true' }}
        run: node scripts/build-registry.mjs

      - name: Commit listing changes
        if: ${{ inputs.dry_run != 'true' && inputs.direct_push == 'true' }}
        run: |
          if [ -z "$(git status --porcelain -- apps dist)" ]; then
            echo "No listing changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/*.json dist/apps.v1.json
          git commit -m "Generate AI listings"
          git push origin "HEAD:${{ github.ref_name }}"

      - name: Create listing pull request
        if: ${{ inputs.dry_run != 'true' && inputs.direct_push != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$(git status --porcelain -- apps)" ]; then
            git checkout -- dist/apps.v1.json
            echo "No listing changes to propose."
            exit 0
          fi

          app="${{ inputs.app }}"
          safe_app="$(printf '%s' "$app" | tr -cs '[:alnum:]-' '-' | sed 's/^-//;s/-$//')"
          base="main"
          branch="automation/ai-listing-${safe_app}"
          title="Generate AI listing for ${app}"
          commit_message="Generate AI listing for ${app}"
          if [ "$app" = "all" ]; then
            title="Generate AI listings"
            commit_message="Generate AI listings"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "$branch:refs/remotes/origin/$branch" || true
          git checkout -B "$branch"
          if [ "$app" = "all" ]; then
            git add apps/*.json dist/apps.v1.json
          else
            git add "apps/${app}.json" dist/apps.v1.json
          fi
          git commit -m "$commit_message"
          git push --force-with-lease origin "$branch"

          body=".tmp/ai-listing-report.md"
          if [ ! -f "$body" ]; then
            body="$(mktemp)"
            printf 'Generated AI listing for `%s`.\n' "$app" > "$body"
          fi

          number="$(gh pr list --head "$branch" --base "$base" --state open --json number --jq '.[0].number')"
          if [ -n "$number" ]; then
            gh pr edit "$number" --body-file "$body"
          else
            gh pr create \
              --base "$base" \
              --head "$branch" \
              --title "$title" \
              --body-file "$body"
          fi
