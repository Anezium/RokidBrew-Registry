name: Verify Nexus plugin APKs

on:
  pull_request:
    paths:
      - "plugins-nexus/*.json"
      - "!plugins-nexus/*.template.json"

permissions:
  contents: read

jobs:
  verify-nexus-plugins:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
      - uses: android-actions/setup-android@v3
      - name: Install Android build tools
        run: sdkmanager "build-tools;35.0.0"
      - name: Verify added and changed Nexus plugin APKs
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: node scripts/verify-nexus-plugin-apks.mjs --base "$BASE_SHA" --head "$HEAD_SHA"
