name: Daily registry maintenance

on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run checks without creating a pull request"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  maintain:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "build-tools;35.0.0"
      - run: sudo apt-get update && sudo apt-get install -y unzip imagemagick librsvg2-bin
      - name: Install apktool
        run: |
          mkdir -p .tmp
          curl -L -o .tmp/apktool.jar https://github.com/iBotPeaches/Apktool/releases/download/v3.0.1/apktool_3.0.1.jar

      - name: Check upstream releases and APK URLs
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            node scripts/check-updates.mjs --dry-run
          else
            node scripts/check-updates.mjs
          fi

      - name: Refresh APK metadata
        if: ${{ inputs.dry_run != 'true' }}
        run: node scripts/update-artifact-metadata.mjs --soft-fail

      - name: Extract missing icons
        if: ${{ inputs.dry_run != 'true' }}
        env:
          APKTOOL_JAR: .tmp/apktool.jar
        run: node scripts/extract-missing-icons.mjs --soft-fail

      - name: Rebuild registry
        if: ${{ inputs.dry_run != 'true' }}
        run: node scripts/build-registry.mjs

      - name: Create maintenance pull request
        if: ${{ inputs.dry_run != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$(git status --porcelain -- apps plugins-nexus brew.json assets/icons dist/nexus-plugins.v1.json)" ]; then
            git checkout -- dist/apps.v1.json
            echo "No registry maintenance changes to propose."
            exit 0
          fi

          branch="automation/registry-maintenance"
          body=".tmp/registry-maintenance-report.md"
          mkdir -p .tmp
          {
            if [ -f ".tmp/update-report.md" ]; then
              cat ".tmp/update-report.md"
            else
              echo "# RokidBrew registry maintenance"
              echo
              echo "Daily maintenance produced registry changes."
            fi
            echo
            echo "## Changed files"
            echo
            echo '```text'
            git status --short apps plugins-nexus brew.json assets/icons dist/apps.v1.json dist/nexus-plugins.v1.json
            echo '```'
          } > "$body"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "$branch:refs/remotes/origin/$branch" || true
          git checkout -B "$branch"
          git add apps/*.json plugins-nexus/*.json dist/apps.v1.json dist/nexus-plugins.v1.json
          [ -f brew.json ] && git add brew.json
          git add assets/icons/*.png 2>/dev/null || true
          git commit -m "Run registry maintenance"
          git push --force-with-lease origin "$branch"

          number="$(gh pr list --head "$branch" --base main --state open --json number --jq '.[0].number')"
          if [ -n "$number" ]; then
            gh pr edit "$number" --body-file "$body"
          else
            gh pr create \
              --base main \
              --head "$branch" \
              --title "Run RokidBrew registry maintenance" \
              --body-file "$body"
          fi

      - name: Fail on update-check errors or warnings
        if: ${{ always() }}
        run: |
          report=".tmp/update-report.md"
          [ -f "$report" ] || exit 0
          errors="$(sed -n 's/^Errors: //p' "$report" | head -n 1)"
          warnings="$(sed -n 's/^Warnings: //p' "$report" | head -n 1)"
          if [ "${errors:-0}" -gt 0 ] || [ "${warnings:-0}" -gt 0 ]; then
            echo "::error::check-updates reported ${errors:-0} error(s) and ${warnings:-0} warning(s); see the update report in the log above."
            exit 1
          fi
