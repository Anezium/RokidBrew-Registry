name: Check app updates

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Check updates without creating a pull request"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      app:
        description: "Optional app id to check; use rokidbrew for self-update metadata"
        required: false
        default: ""

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "build-tools;35.0.0"
      - name: Check upstream updates
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          args=()
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            args+=(--dry-run)
          fi
          if [ -n "${{ inputs.app }}" ]; then
            args+=(--app "${{ inputs.app }}")
          fi
          node scripts/check-updates.mjs "${args[@]}"
      - name: Rebuild registry
        if: ${{ inputs.dry_run != 'true' }}
        run: node scripts/build-registry.mjs
      - name: Create update pull request
        if: ${{ inputs.dry_run != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$(git status --porcelain -- apps brew.json)" ]; then
            git checkout -- dist/apps.v1.json
            echo "No app or RokidBrew updates to propose."
            exit 0
          fi

          branch="automation/app-updates"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "$branch:refs/remotes/origin/$branch" || true
          git checkout -B "$branch"
          git add apps/*.json brew.json dist/apps.v1.json
          git commit -m "Update app artifacts and RokidBrew metadata"
          git push --force-with-lease origin "$branch"

          number="$(gh pr list --head "$branch" --base main --state open --json number --jq '.[0].number')"
          if [ -n "$number" ]; then
            gh pr edit "$number" --body-file .tmp/update-report.md
          else
            gh pr create \
              --base main \
              --head "$branch" \
              --title "Update RokidBrew app artifacts and metadata" \
              --body-file .tmp/update-report.md
          fi

      - name: Fail on update-check errors or warnings
        if: ${{ always() }}
        run: |
          report=".tmp/update-report.md"
          [ -f "$report" ] || exit 0
          errors="$(sed -n 's/^Errors: //p' "$report" | head -n 1)"
          warnings="$(sed -n 's/^Warnings: //p' "$report" | head -n 1)"
          if [ "${errors:-0}" -gt 0 ] || [ "${warnings:-0}" -gt 0 ]; then
            echo "::error::check-updates reported ${errors:-0} error(s) and ${warnings:-0} warning(s); see the update report in the log above."
            exit 1
          fi
