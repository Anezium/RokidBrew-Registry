name: Extract missing icons

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Overwrite existing icons"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "build-tools;35.0.0"
      - run: sudo apt-get update && sudo apt-get install -y unzip imagemagick
      - name: Extract APK icons
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            node scripts/extract-missing-icons.mjs --force
          else
            node scripts/extract-missing-icons.mjs
          fi
      - run: node scripts/build-registry.mjs
      - name: Commit generated icons
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- assets/icons; then
            git checkout -- dist/apps.v1.json
            echo "No icon changes to commit."
          else
            git add assets/icons/*.png dist/apps.v1.json
            git commit -m "Extract missing app icons"
            git push
          fi
